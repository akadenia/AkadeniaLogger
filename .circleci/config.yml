version: 2.1

orbs:
  node: circleci/node@7.2.1

jobs:
  build_lint_test_node:
    parameters:
      node-version:
        type: string
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - node/install:
          node-version: << parameters.node-version >>
          install-pnpm: true
      - node/install-packages:
          pkg-manager: pnpm
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test

  build_lint_test:
    docker:
      - image: cimg/base:current
    steps:
      - run: echo "All node version tests passed"

  release:
    docker:
      - image: cimg/base:current
    environment:
      CI: "true"
      HUSKY: "0"
    steps:
      - checkout
      - node/install:
          node-version: "22"
          install-pnpm: true
      - node/install-packages:
          pkg-manager: pnpm
      - run: pnpm build
      - run:
          name: Semantic Release
          command: npx semantic-release

workflows:
  ci:
    jobs:
      - build_lint_test_node:
          matrix:
            parameters:
              node-version: ["22", "24", "26"]
      - build_lint_test:
          requires:
            - build_lint_test_node
      - release:
          requires:
            - build_lint_test
          context: npm-publish
          filters:
            branches:
              only: main
