version: 2.1

jobs:
  build_lint_test_node:
    parameters:
      node-version:
        type: string
    docker:
      - image: cimg/node:<< parameters.node-version >>
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm run --if-present test

  build_lint_test:
    docker:
      - image: cimg/base:current
    steps:
      - run: echo "All node version tests passed"

  release:
    docker:
      - image: cimg/node:22.23
    environment:
      CI: "true"
      HUSKY: "0"
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - run: pnpm build
      - run:
          name: Semantic Release
          command: npx semantic-release
      - run:
          name: Create Release Assets PR
          command: |
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$VERSION" ] && git log -1 --format=%s | grep -q "chore(release)"; then
              PAYLOAD=$(jq -n \
                --arg title "chore(release): merge release ${VERSION} assets" \
                --arg head "release/${VERSION}" \
                --arg base "main" \
                --arg body "Merge release ${VERSION} assets" \
                '{title: $title, head: $head, base: $base, body: $body}')
              RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                -H "Authorization: Bearer *** \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/pulls" \
                -d "$PAYLOAD")
              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              BODY=$(echo "$RESPONSE" | head -n -1)
              if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "422" ]; then
                echo "PR creation failed (HTTP $HTTP_CODE): $BODY"
                exit 1
              fi
              echo "PR creation response (HTTP $HTTP_CODE): $BODY"
            fi

workflows:
  ci:
    jobs:
      - build_lint_test_node:
          matrix:
            parameters:
              node-version: ["22.23", "24.18", "26.3"]
      - build_lint_test:
          requires:
            - build_lint_test_node
      - release:
          requires:
            - build_lint_test
          context: npm-publish
          filters:
            branches:
              only: main
