version: 2.1

jobs:
  build_lint_test_node:
    parameters:
      docker-image:
        type: string
    docker:
      - image: << parameters.docker-image >>
    steps:
      - checkout
      - run: sudo corepack enable
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm run --if-present test

  build_lint_test:
    docker:
      - image: cimg/node:current
    steps:
      - run: echo "All node version tests passed"

  release:
    docker:
      - image: cimg/node:current
    environment:
      CI: "true"
      HUSKY: "0"
    steps:
      - checkout
      - run: sudo corepack enable
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run build
      - run:
          name: Semantic Release
          command: npx semantic-release
      - run:
          name: Create Release Assets PR
          command: |
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$VERSION" ] && git log -1 --format=%s | grep -q "chore(release)"; then
              PAYLOAD=$(jq -n \
                --arg title "chore(release): merge release ${VERSION} assets" \
                --arg head "release/${VERSION}" \
                --arg base "main" \
                --arg body "Merge release ${VERSION} assets" \
                '{title: $title, head: $head, base: $base, body: $body}')
              RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/pulls" \
                -d "$PAYLOAD")
              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              BODY=$(echo "$RESPONSE" | head -n -1)
              if [ "$HTTP_CODE" = "201" ]; then
                echo "PR created successfully (HTTP 201): $BODY"
                exit 0
              fi
              if [ "$HTTP_CODE" = "422" ] && echo "$BODY" | grep -q "pull request already exists"; then
                echo "PR already exists (HTTP 422): $BODY"
                exit 0
              fi
              echo "PR creation failed (HTTP $HTTP_CODE): $BODY"
              exit 1
            fi

workflows:
  ci:
    jobs:
      - build_lint_test_node:
          matrix:
            parameters:
              docker-image: ["cimg/node:22.0", "cimg/node:24.0", "cimg/node:current"]
      - build_lint_test:
          requires:
            - build_lint_test_node
      - release:
          requires:
            - build_lint_test
          context: npm-publish
          filters:
            branches:
              only: main
